name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux UI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0 xvfb
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - name: Test
        if: runner.os != 'Linux'
        run: uv run pytest -q
      - name: Test under X11
        if: runner.os == 'Linux'
        run: xvfb-run -a uv run pytest -q
